{% extends "base.html" %}

{% block title %}Message sent — SAE Books{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 px-8 py-10 text-center">

      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-green-100 dark:bg-green-950">
        <svg class="h-6 w-6 text-green-600 dark:text-green-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>

      <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">Message sent</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
        Thanks for reaching out. We'll get back to you as soon as possible.
      </p>

      <a href="https://saebooks.com.au"
         class="inline-block rounded-md bg-[#194291] px-4 py-2 text-sm font-medium
                text-white hover:bg-[#133372] focus:outline-none focus:ring-2
                focus:ring-[#194291] focus:ring-offset-2 dark:focus:ring-offset-gray-900">
        Back to SAE Books
      </a>

    </div>
  </div>
</div>
{% endblock %}
