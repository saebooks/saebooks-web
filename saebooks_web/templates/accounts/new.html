{% extends "base.html" %}

{% block title %}New Account — SAE Books{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold text-gray-900">New Account</h1>
  <a href="/accounts" class="text-sm text-[#194291] hover:underline">← Back to accounts</a>
</div>

<div class="bg-white rounded-xl border border-gray-200 shadow-sm px-6 py-6 max-w-2xl">
  <form method="POST" action="/accounts/new" novalidate>
    {{ csrf_input(request)|safe }}


    {# Idempotency key — prevents double-submit on page reload #}
    <input type="hidden" name="idempotency_key" value="{{ idempotency_key }}">

    {% include "accounts/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="rounded-md bg-[#194291] px-5 py-2 text-sm font-medium text-white
               hover:bg-[#133372] focus:outline-none focus:ring-2 focus:ring-[#194291] focus:ring-offset-2"
      >
        Save account
      </button>
      <a
        href="/accounts"
        class="rounded-md border border-gray-300 px-5 py-2 text-sm font-medium text-gray-700
               hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-[#194291] focus:ring-offset-2"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
