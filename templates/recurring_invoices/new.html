{% extends "base.html" %}

{% block title %}New Recurring Invoice — {{ current_brand().name }}{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold ink-1">New Recurring Invoice</h1>
  <a href="/recurring-invoices" class="text-sm sae hover:underline">← Back to recurring invoices</a>
</div>

<div class="card px-6 py-6">
  <form method="POST" action="/recurring-invoices/new" novalidate>
    {{ csrf_input(request)|safe }}


    {% include "recurring_invoices/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="btn-primary text-sm"
      >
        Save recurring invoice
      </button>
      <a
        href="/recurring-invoices"
        class="btn-secondary text-sm"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
