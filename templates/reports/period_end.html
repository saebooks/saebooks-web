{% extends "base.html" %}

{% block title %}Period-End Close — SAE Books{% endblock %}

{% block content %}

<div class="mb-4">
  <a href="/reports" class="text-xs sae hover:underline font-mono uppercase tracking-wider">← reports</a>
</div>

<header class="mb-6 relative">
  <div class="dot-grid-soft absolute inset-0 -z-10 opacity-30"></div>
  <div class="flex items-start justify-between gap-4">
    <div>
      <div class="flex items-center gap-2 mb-1">
        <span class="nav-section-label">Period-end</span>
        <span class="reg-mark"></span>
      </div>
      <h1 class="font-display text-3xl leading-none tracking-tight flex items-center gap-3">
        <i data-lucide="lock" class="w-7 h-7 ink-3" aria-hidden="true"></i>
        <span>Year-End Close</span>
      </h1>
      <p class="text-xs ink-3 font-mono mt-2">Roll the year's profit into retained earnings and lock the period.</p>
    </div>
  </div>
  <div class="drafting mt-4"></div>
</header>

<form hx-get="/reports/period-end" hx-target="#period-end-content" hx-swap="innerHTML" hx-indicator="#period-end-spinner"
      class="card p-4 mb-5 flex flex-wrap gap-3 items-end">
  <div>
    <label for="through_date" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">Close through (FY end)</label>
    <input id="through_date" type="date" name="through_date" value="{{ through_date }}" class="saebooks-input num text-sm py-1.5">
  </div>
  <div>
    <label for="from_date" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">From date (optional)</label>
    <input id="from_date" type="date" name="from_date" value="{{ from_date }}" class="saebooks-input num text-sm py-1.5">
  </div>
  <div>
    <label for="retained_earnings_account_id" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">Retained-earnings account</label>
    <select id="retained_earnings_account_id" name="retained_earnings_account_id" class="saebooks-input text-sm py-1.5 min-w-[18rem]">
      <option value="">— select equity account —</option>
      {% for a in accounts %}
      <option value="{{ a.id }}" {% if a.id == retained_earnings_account_id %}selected{% endif %}>
        {{ a.code }} · {{ a.name }}
      </option>
      {% endfor %}
    </select>
  </div>
  <button type="submit" class="btn-primary text-sm">Preview</button>
</form>

<div id="period-end-content">
  {% include "reports/_period_end_preview.html" %}
</div>

{% endblock %}
