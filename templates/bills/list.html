{% extends "base.html" %}

{% block title %}Bills — SAE Books{% endblock %}

{% block content %}

{% if flash %}
<div class="card p-3 mb-4 flex items-center gap-2" style="border-color:var(--warm);">
  <span class="dot" style="background:var(--warm);"></span>
  <span class="text-sm ink-2">{{ flash }}</span>
</div>
{% endif %}

<header class="mb-6 relative">
  <div class="dot-grid-soft absolute inset-0 -z-10 opacity-30"></div>
  <div class="flex items-start justify-between gap-4">
    <div>
      <div class="flex items-center gap-2 mb-1">
        <span class="nav-section-label">Payables</span>
        <span class="reg-mark"></span>
      </div>
      <h1 class="font-display text-3xl leading-none tracking-tight" style="font-variation-settings:'opsz' 72;">Bills</h1>
      {% if not error %}
      <p class="text-xs ink-3 font-mono mt-2">{{ total }} bill{{ "s" if total != 1 else "" }}</p>
      {% endif %}
    </div>
    <a href="/bills/new" class="btn-primary text-sm">+ New bill</a>
  </div>
  <div class="drafting mt-4"></div>
</header>

<form hx-get="/bills" hx-target="#bills-table" hx-swap="outerHTML" hx-push-url="true"
      class="card p-4 mb-5 flex flex-wrap gap-3 items-end">
  <div>
    <label for="status" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">Status</label>
    <select id="status" name="status" class="saebooks-input text-sm py-1.5">
      <option value="" {% if not filter_status %}selected{% endif %}>All</option>
      <option value="DRAFT" {% if filter_status == 'DRAFT' %}selected{% endif %}>Draft</option>
      <option value="POSTED" {% if filter_status == 'POSTED' %}selected{% endif %}>Posted</option>
      <option value="VOIDED" {% if filter_status == 'VOIDED' %}selected{% endif %}>Voided</option>
    </select>
  </div>
  <div>
    <label for="date_from" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">Date from</label>
    <input type="date" id="date_from" name="date_from" value="{{ filter_date_from }}" class="saebooks-input num text-sm py-1.5">
  </div>
  <div>
    <label for="date_to" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">Date to</label>
    <input type="date" id="date_to" name="date_to" value="{{ filter_date_to }}" class="saebooks-input num text-sm py-1.5">
  </div>
  <div>
    <label for="contact_id" class="text-[10px] font-mono uppercase tracking-wider ink-3 block mb-1">Supplier UUID</label>
    <input type="text" id="contact_id" name="contact_id" value="{{ filter_contact_id }}" placeholder="optional"
           class="saebooks-input text-sm py-1.5 w-64">
  </div>
  <input type="hidden" name="limit" value="{{ limit }}">
  <input type="hidden" name="offset" value="0">
  <button type="submit" class="btn-primary text-sm">Filter</button>
</form>

{% include "bills/_table.html" %}

{% endblock %}
