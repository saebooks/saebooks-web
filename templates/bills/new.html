{% extends "base.html" %}

{% block title %}New Bill — SAE Books{% endblock %}

{% block content %}

<div class="mb-5 flex items-center gap-3">
  <a href="/bills" class="text-xs ink-3 hover:underline font-mono uppercase tracking-wider">← bills</a>
  <span class="ink-4">/</span>
  <h1 class="font-display text-xl ink-1">New bill</h1>
</div>

<div id="ai-extract-probe-target"
     hx-get="/bills/extract-document/probe"
     hx-trigger="load"
     hx-swap="innerHTML"></div>

<div class="card p-6">
  <form method="POST" action="/bills/new" novalidate>
    {{ csrf_input(request)|safe }}

    {% include "bills/_form_fields.html" %}

    <div class="mt-7 hairline pt-5 flex items-center gap-3">
      <button type="submit" class="btn-primary">Save bill</button>
      <a href="/bills" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
