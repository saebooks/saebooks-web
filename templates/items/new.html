{% extends "base.html" %}

{% block title %}New Item — SAE Books{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold ink-1">New Item</h1>
  <a href="/items" class="text-sm sae hover:underline">← Back to items</a>
</div>

<div class="card shadow-sm px-6 py-6 max-w-2xl">
  <form method="POST" action="/items/new" novalidate>
    {{ csrf_input(request)|safe }}


    {# Idempotency key — prevents double-submit on page reload #}
    <input type="hidden" name="idempotency_key" value="{{ idempotency_key }}">

    {% include "items/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="btn-primary text-sm px-5 py-2"
      >
        Save item
      </button>
      <a
        href="/items"
        class="btn-secondary text-sm px-5 py-2"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
