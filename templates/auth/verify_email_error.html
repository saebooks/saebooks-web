{% extends "base.html" %}

{% block title %}Link error — SAE Books{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 px-8 py-10 text-center">

      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-amber-100 dark:bg-amber-900">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="h-6 w-6 text-amber-600 dark:text-amber-300">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>

      <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">Link couldn't be used</h1>
      <p class="text-sm text-gray-600 dark:text-gray-400">{{ message }}</p>

      <div class="mt-6 flex flex-col gap-2">
        <a href="/forgot-password"
           class="inline-flex items-center justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700">
          Request a new link
        </a>
        <a href="/login" class="text-sm text-indigo-600 dark:text-indigo-400 hover:underline">
          Back to sign-in
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
