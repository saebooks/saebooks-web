{% extends "base.html" %}

{% block title %}Sign in — SAE Books{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 px-8 py-10">

      <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-1">Sign in</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">
        Enter your SAE Books email address and password.
      </p>

      {% if error %}
      <div class="mb-4 rounded-md bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 px-4 py-3 text-sm text-red-700 dark:text-red-300">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-4">
          <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Email
          </label>
          <input
            id="email"
            name="email"
            type="email"
            required
            autocomplete="email"
            class="w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 text-sm
                   bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                   placeholder:text-gray-400 dark:placeholder:text-gray-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            placeholder="you@example.com"
          >
        </div>

        <div class="mb-6">
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">
            Password
          </label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autocomplete="current-password"
            class="w-full rounded-md border border-gray-300 dark:border-gray-600 px-3 py-2 text-sm
                   bg-white dark:bg-gray-800 text-gray-900 dark:text-gray-100
                   placeholder:text-gray-400 dark:placeholder:text-gray-500
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            placeholder="Password"
          >
        </div>

        <button
          type="submit"
          class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium
                 text-white hover:bg-indigo-700 focus:outline-none focus:ring-2
                 focus:ring-indigo-500 dark:focus:ring-offset-gray-900 focus:ring-offset-2"
        >
          Sign in
        </button>
      </form>

    </div>
  </div>
</div>
{% endblock %}
