{% extends "base.html" %}

{% block title %}Sign in — SAE Books{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 px-8 py-10">

      <h1 class="text-xl font-semibold text-gray-900 mb-1">Sign in</h1>
      <p class="text-sm text-gray-500 mb-6">
        Enter the API token configured on your SAE Books server.
      </p>

      {% if error %}
      <div class="mb-4 rounded-md bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-4">
          <label for="api_token" class="block text-sm font-medium text-gray-700 mb-1">
            API Token
          </label>
          <input
            id="api_token"
            name="api_token"
            type="password"
            required
            autocomplete="current-password"
            class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            placeholder="Paste your API token"
          >
        </div>

        <button
          type="submit"
          class="w-full rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium
                 text-white hover:bg-indigo-700 focus:outline-none focus:ring-2
                 focus:ring-indigo-500 focus:ring-offset-2"
        >
          Sign in
        </button>
      </form>

      <p class="mt-4 text-xs text-gray-400">
        The token is set via <code>SAEBOOKS_DEV_API_TOKEN</code> on the API server.
        <!-- TODO(phase-1): replace with email + password form once portal JWT auth lands -->
      </p>
    </div>
  </div>
</div>
{% endblock %}
