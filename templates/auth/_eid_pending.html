{# Verification-code fragment — replaces #eid-flow and polls /auth/eid/poll.
   Context: verification_code, mode, csrf_token. #}
<div id="eid-flow"
     hx-post="/auth/eid/poll"
     hx-trigger="load delay:2s"
     hx-target="this"
     hx-swap="outerHTML"
     hx-vals='{"csrf_token": "{{ csrf_token }}"}'
     class="rounded-xl border border-gray-200 dark:border-gray-700 p-6 text-center">
  <p class="text-sm text-gray-600 dark:text-gray-300 mb-3">
    {{ _("Check your device and confirm only if you see this code:") }}
  </p>
  <div class="text-4xl font-semibold tracking-[0.3em] text-gray-900 dark:text-gray-100 mb-4"
       data-testid="eid-verification-code">{{ verification_code }}</div>
  <p class="text-xs text-gray-500 dark:text-gray-400">
    {{ _("Waiting for confirmation…") }}
  </p>
</div>
