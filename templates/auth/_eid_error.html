{# Terminal-error fragment — replaces #eid-flow.
   Context: message, mode ("login"|"link"). #}
<div id="eid-flow" class="space-y-3">
  <div class="rounded-md bg-red-50 dark:bg-red-950 border border-red-200 dark:border-red-800 px-4 py-3 text-sm text-red-700 dark:text-red-300"
       data-testid="eid-error">
    {{ message }}
  </div>
  <a href="{{ '/settings/eid' if mode == 'link' else '/auth/eid/login' }}"
     class="inline-flex items-center text-sm font-medium text-[#194291] dark:text-[#8aa9d8] hover:underline">
    {{ _("Try again") }}
  </a>
</div>
