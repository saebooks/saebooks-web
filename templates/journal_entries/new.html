{% extends "base.html" %}

{% block title %}New Journal Entry — SAE Books{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold text-gray-900">New Journal Entry</h1>
  <a href="/journal-entries" class="text-sm text-indigo-600 hover:underline">← Back to journal entries</a>
</div>

<div class="bg-white rounded-xl border border-gray-200 shadow-sm px-6 py-6">
  <form method="POST" action="/journal-entries/new" novalidate>

    {% include "journal_entries/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="rounded-md bg-indigo-600 px-5 py-2 text-sm font-medium text-white
               hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        Save journal entry
      </button>
      <a
        href="/journal-entries"
        class="rounded-md border border-gray-300 px-5 py-2 text-sm font-medium text-gray-700
               hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
