{% extends "base.html" %}

{% block title %}New Journal Entry — SAE Books{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold ink-1">New Journal Entry</h1>
  <a href="/journal-entries" class="text-sm sae hover:underline">← Back to journal entries</a>
</div>

<div class="card rounded-xl shadow-sm px-6 py-6">
  <form method="POST" action="/journal-entries/new" novalidate>
    {{ csrf_input(request)|safe }}


    {% include "journal_entries/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="btn-primary text-sm"
      >
        Save journal entry
      </button>
      <a
        href="/journal-entries"
        class="btn-secondary text-sm"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
