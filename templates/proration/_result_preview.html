{% if result %}
<div class="card rounded-md px-4 py-3 text-sm" style="border-color:var(--pos);background:var(--pos-tint)">
  <div class="grid grid-cols-2 gap-2">
    <div class="ink-2">Days used</div>
    <div class="font-mono tabular-nums text-right ink-1">{{ result.days_used }} of {{ result.days_in_full }}</div>
    <div class="ink-2">Factor</div>
    <div class="font-mono tabular-nums text-right ink-1">{{ result.factor }}</div>
    <div class="ink-2 font-semibold">Prorated amount</div>
    <div class="font-mono tabular-nums text-right font-semibold" style="color:var(--pos)">
      {{ num(result.prorated_amount|float, 2) }}
    </div>
  </div>
</div>
{% else %}
<div class="card rounded-md px-4 py-3 text-sm" style="border-color:var(--neg);color:var(--neg)">
  HTTP {{ status }}: {{ error.detail if error and error.detail is defined else error }}
</div>
{% endif %}
