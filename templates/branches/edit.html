{% extends "base.html" %}
{% block title %}Edit {{ branch.code }} — SAE Books{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto p-6">
  <div class="mb-6">
    <a href="/branches" class="text-sm underline ink-2 hover:no-underline">← Branches</a>
    <h1 class="text-2xl font-semibold mt-2">Edit branch <span class="font-mono">{{ branch.code }}</span></h1>
  </div>

  {% if errors %}
    <div class="rounded-md border px-4 py-3 mb-4 text-sm bg-[color:var(--neg-tint)] border-[color:var(--neg)] text-[color:var(--neg)]">
      {{ errors }}
    </div>
  {% endif %}

  <form method="post" action="/branches/{{ branch.id }}/edit" class="space-y-4 rounded-xl border hairline p-6"
        style="background: var(--surface);">
  {{ csrf_input(request) | safe }}
    <div>
      <label class="block text-sm font-medium mb-1">Code (immutable)</label>
      <div class="font-mono ink-3">{{ branch.code }}</div>
    </div>
    <div>
      <label class="block text-sm font-medium mb-1" for="name">Display name</label>
      <input type="text" id="name" name="name" required maxlength="255"
             value="{{ branch.name }}"
             class="saebooks-input w-full" />
    </div>
    <div class="flex items-center gap-2">
      <input type="checkbox" id="is_default" name="is_default" value="true"
             {% if branch.is_default %}checked{% endif %} />
      <label for="is_default" class="text-sm">Default branch for this company</label>
    </div>
    <div class="flex items-center gap-3 pt-2">
      <button type="submit" class="btn-primary">Save</button>
      <a href="/branches" class="text-sm underline ink-2">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
