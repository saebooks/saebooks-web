{#
  _line_row.html — single PO line-item row.

  Used both when rendering the full new-PO form and as an HTMX fragment
  returned by GET /purchase_orders/_add_line?index=N.
#}
<tr class="line-row hairline-b">
  {# Account #}
  <td class="px-3 py-2">
    <select
      name="lines[{{ index }}][account_id]"
      class="saebooks-input w-full"
    >
      <option value="">{{ _("— account —") }}</option>
      {% for acct in accounts %}
      <option value="{{ acct.id }}"
        {% if line.get("account_id") == acct.id %}selected{% endif %}>
        {{ acct.code }} — {{ acct.name }}
      </option>
      {% endfor %}
    </select>
  </td>

  {# Description #}
  <td class="px-3 py-2">
    <input
      type="text"
      name="lines[{{ index }}][description]"
      value="{{ line.get('description', '') }}"
      placeholder="Description"
      aria-label="{{ _('Line description') }}"
      class="saebooks-input w-full"
    >
  </td>

  {# Quantity #}
  <td class="px-3 py-2 w-24">
    <input
      type="number"
      name="lines[{{ index }}][quantity]"
      value="{{ line.get('quantity', '1') }}"
      step="0.001"
      min="0"
      aria-label="{{ _('Quantity') }}"
      class="saebooks-input w-full text-right"
    >
  </td>

  {# Unit price #}
  <td class="px-3 py-2 w-28">
    <input
      type="number"
      name="lines[{{ index }}][unit_price]"
      value="{{ line.get('unit_price', '') }}"
      step="0.01"
      min="0"
      placeholder="0.00"
      aria-label="{{ _('Unit price') }}"
      class="saebooks-input w-full text-right"
    >
  </td>

  {# Tax code #}
  <td class="px-3 py-2 w-32">
    <select
      name="lines[{{ index }}][tax_code_id]"
      class="saebooks-input w-full"
    >
      <option value="">{{ _("— none —") }}</option>
      {% for tc in tax_codes %}
      <option value="{{ tc.id }}"
        {% if line.get("tax_code_id") == tc.id %}selected{% endif %}>
        {{ tc.name }}
      </option>
      {% endfor %}
    </select>
  </td>

  {# Project #}
  <td class="px-3 py-2 w-36">
    <select
      name="lines[{{ index }}][project_id]"
      class="saebooks-input w-full"
    >
      <option value="">{{ _("— none —") }}</option>
      {% for proj in projects %}
      <option value="{{ proj.id }}"
        {% if line.get("project_id") and line.get("project_id")|string == proj.id|string %}selected{% endif %}>
        {{ proj.code }} — {{ proj.name }}
      </option>
      {% endfor %}
    </select>
  </td>

  {# Remove button #}
  <td class="px-3 py-2 w-10 text-center">
    <button
      type="button"
      onclick="this.closest('tr').remove()"
      class="text-lg leading-none font-bold"
      style="color:var(--neg);"
      aria-label="{{ _('Remove line') }}"
      title="{{ _('Remove line') }}"
    >&times;</button>
  </td>
</tr>
