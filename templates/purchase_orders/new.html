{% extends "base.html" %}

{% block title %}New purchase order — SAE Books{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold ink-1">New purchase order</h1>
  <a href="/purchase_orders" class="text-sm sae hover:underline">← Back to purchase orders</a>
</div>

<div class="card px-6 py-6">
  <form method="POST" action="/purchase_orders/new" novalidate>
    {{ csrf_input(request)|safe }}

    {% include "purchase_orders/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="btn-primary text-sm"
      >
        Save purchase order
      </button>
      <a
        href="/purchase_orders"
        class="btn-secondary text-sm"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
