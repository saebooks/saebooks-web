{#
  Partial: invoices/_stripe_payment_link.html
  Target: #stripe-payment-link-area   (outerHTML swap)
#}

{% if stripe_error %}
<div id="stripe-payment-link-area" class="card p-3 flex items-center gap-2" style="border-color:var(--neg);">
  <span class="dot" style="background:var(--neg);"></span>
  <span class="text-sm" style="color:var(--neg);">{{ stripe_error }}</span>
</div>

{% elif stripe_payment_link %}
<div id="stripe-payment-link-area" class="card p-3 flex items-center gap-3">
  <span class="dot" style="background:var(--sae);"></span>
  <span class="text-sm ink-2 num truncate max-w-xs flex-1" title="{{ stripe_payment_link }}">
    {{ stripe_payment_link }}
  </span>
  <button type="button"
          onclick="navigator.clipboard.writeText('{{ stripe_payment_link }}').then(() => { this.textContent = 'Copied!'; setTimeout(() => { this.textContent = 'Copy link'; }, 2000); })"
          class="btn-primary text-sm py-1.5">{{ _("Copy link") }}</button>
</div>

{% else %}
<div id="stripe-payment-link-area">
  <button type="button"
          hx-post="/invoices/{{ invoice_id }}/stripe-payment-link"
          hx-target="#stripe-payment-link-area"
          hx-swap="outerHTML"
          class="btn-primary text-sm">{{ _("Send payment link") }}</button>
</div>
{% endif %}
