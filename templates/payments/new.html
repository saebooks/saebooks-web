{% extends "base.html" %}

{% block title %}New Payment — {{ current_brand().name }}{% endblock %}

{% block content %}

<div class="mb-5 flex items-center gap-3">
  <a href="/payments" class="text-xs ink-3 hover:underline font-mono uppercase tracking-wider">← payments</a>
  <span class="ink-4">/</span>
  <h1 class="font-display text-xl ink-1">New payment</h1>
</div>

<div class="card p-6">
  <form method="POST" action="/payments/new" novalidate>
    {{ csrf_input(request)|safe }}

    {% include "payments/_form_fields.html" %}

    <div class="mt-7 hairline pt-5 flex items-center gap-3">
      <button type="submit" class="btn-primary">Save payment</button>
      <a href="/payments" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
