{# _allocation_row.html — single payment allocation row. #}
<tr class="alloc-row">
  <td class="px-3 py-2 w-32">
    <select name="allocations[{{ index }}][target_type]" class="saebooks-input text-sm py-1.5">
      <option value="INVOICE" {% if alloc.get("target_type", "INVOICE") == "INVOICE" %}selected{% endif %}>Invoice</option>
      <option value="BILL" {% if alloc.get("target_type") == "BILL" %}selected{% endif %}>Bill</option>
    </select>
  </td>

  <td class="px-3 py-2">
    <input type="text" name="allocations[{{ index }}][target_id]"
           value="{{ alloc.get('target_id', alloc.get('invoice_id', alloc.get('bill_id', ''))) }}"
           placeholder="Invoice or bill UUID"
           class="saebooks-input text-sm py-1.5 font-mono">
  </td>

  <td class="px-3 py-2 w-32">
    <input type="number" name="allocations[{{ index }}][amount]"
           value="{{ alloc.get('amount', '') }}"
           step="0.01" min="0" placeholder="0.00"
           class="saebooks-input num-display text-sm py-1.5 text-right">
  </td>

  <td class="px-3 py-2 w-10 text-center">
    <button type="button" onclick="this.closest('tr').remove()"
            class="ink-4 hover:text-[color:var(--neg)] text-lg leading-none font-bold transition-colors"
            title="Remove allocation">&times;</button>
  </td>
</tr>
