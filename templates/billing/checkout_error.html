{% extends "base.html" %}

{% block title %}Checkout error — {{ current_brand().name }}{% endblock %}

{% block content %}
<div class="flex min-h-[70vh] items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white dark:bg-gray-900 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 px-8 py-10 text-center">
      <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-full bg-red-100 dark:bg-red-950">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
             class="h-6 w-6 text-red-600 dark:text-red-400">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="15" y1="9" x2="9" y2="15"></line>
          <line x1="9" y1="9" x2="15" y2="15"></line>
        </svg>
      </div>
      <h1 class="text-xl font-semibold text-gray-900 dark:text-gray-100 mb-2">Couldn't start checkout</h1>
      <p class="text-sm text-gray-600 dark:text-gray-400">{{ message }}</p>
      <div class="mt-6 flex flex-col gap-2">
        <a href="/billing/upgrade" class="inline-flex items-center justify-center rounded-md bg-[#194291] px-4 py-2 text-sm font-medium text-white hover:bg-[#133372]">
          View plans
        </a>
        <a href="/" class="text-sm text-[#194291] dark:text-[#8aa9d8] hover:underline">
          Back to dashboard
        </a>
        <a href="mailto:billing@saebooks.com.au" class="text-sm text-gray-400 dark:text-gray-500 hover:underline">
          Contact billing@saebooks.com.au
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
