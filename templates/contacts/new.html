{% extends "base.html" %}

{% block title %}New Contact — SAE Books{% endblock %}

{% block content %}

<div class="mb-5 flex items-center gap-3">
  <a href="/contacts" class="text-xs ink-3 hover:underline font-mono uppercase tracking-wider">← contacts</a>
  <span class="ink-4">/</span>
  <h1 class="font-display text-xl ink-1" style="font-variation-settings:'opsz' 36;">New contact</h1>
</div>

<div class="card p-6 max-w-2xl">
  <form method="POST" action="/contacts/new" novalidate>
    {{ csrf_input(request)|safe }}

    <input type="hidden" name="idempotency_key" value="{{ idempotency_key }}">

    {% include "contacts/_form_fields.html" %}

    <div class="mt-7 hairline pt-5 flex items-center gap-3">
      <button type="submit" class="btn-primary">Save contact</button>
      <a href="/contacts" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
