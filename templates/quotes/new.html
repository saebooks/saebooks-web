{% extends "base.html" %}

{% block title %}{{ _("New Quote") }} — {{ current_brand().name }}{% endblock %}

{% block content %}

<div class="mb-5 flex items-center gap-3">
  <a href="/quotes" class="text-xs ink-3 hover:underline font-mono uppercase tracking-wider">← {{ _("quotes") }}</a>
  <span class="ink-4">/</span>
  <h1 class="font-display text-xl ink-1">{{ _("New quote") }}</h1>
</div>

<div class="card p-6">
  <form method="POST" action="/quotes/new" novalidate>
    {{ csrf_input(request)|safe }}

    {% include "quotes/_form_fields.html" %}

    <div class="mt-7 hairline pt-5 flex items-center gap-3">
      <button type="submit" class="btn-primary">{{ _("Save quote") }}</button>
      <a href="/quotes" class="btn-secondary">{{ _("Cancel") }}</a>
    </div>
  </form>
</div>

{% endblock %}
