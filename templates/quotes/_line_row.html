{# _line_row.html — single quote line-item row. Used inline + by /quotes/_add_line htmx. #}
<tr class="line-row">
  <td class="px-3 py-2">
    <select name="lines[{{ index }}][account_id]" aria-label="Account, row {{ index }}" class="saebooks-input text-sm py-1.5">
      <option value="">— account —</option>
      {% for acct in accounts %}
      <option value="{{ acct.id }}" {% if line.get("account_id") == acct.id %}selected{% endif %}>
        {{ acct.code }} — {{ acct.name }}
      </option>
      {% endfor %}
    </select>
  </td>

  <td class="px-3 py-2">
    <input type="text" name="lines[{{ index }}][description]" aria-label="Description, row {{ index }}" value="{{ line.get('description', '') }}"
           placeholder="Description" class="saebooks-input text-sm py-1.5">
  </td>

  <td class="px-3 py-2 w-24">
    <input type="number" name="lines[{{ index }}][quantity]" aria-label="Quantity, row {{ index }}" value="{{ line.get('quantity', '1') }}"
           step="0.001" min="0" class="saebooks-input num text-sm py-1.5 text-right">
  </td>

  <td class="px-3 py-2 w-28">
    <input type="number" name="lines[{{ index }}][unit_price]" aria-label="Unit price, row {{ index }}" value="{{ line.get('unit_price', '') }}"
           step="0.01" placeholder="0.00"
           class="saebooks-input num-display text-sm py-1.5 text-right">
  </td>

  <td class="px-3 py-2 w-32">
    <select name="lines[{{ index }}][tax_code_id]" aria-label="Tax code, row {{ index }}" class="saebooks-input text-sm py-1.5">
      <option value="">— none —</option>
      {% for tc in tax_codes %}
      <option value="{{ tc.id }}" {% if line.get("tax_code_id") == tc.id %}selected{% endif %}>
        {{ tc.name }}
      </option>
      {% endfor %}
    </select>
  </td>

  <td class="px-3 py-2 w-10 text-center">
    <button type="button" onclick="this.closest('tr').remove()"
            class="ink-4 hover:text-[color:var(--neg)] text-lg leading-none font-bold transition-colors"
            title="Remove line">&times;</button>
  </td>
</tr>
