{% extends "base.html" %}

{% block title %}New Credit Note — SAE Books{% endblock %}

{% block content %}

<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-semibold ink-1">New Credit Note</h1>
  <a href="/credit-notes" class="text-sm sae hover:underline">← Back to credit notes</a>
</div>

<div class="card px-6 py-6">
  <form method="POST" action="/credit-notes/new" novalidate>
    {{ csrf_input(request)|safe }}


    {% include "credit_notes/_form_fields.html" %}

    <div class="mt-8 flex items-center gap-3">
      <button
        type="submit"
        class="btn-primary text-sm"
      >
        Save credit note
      </button>
      <a
        href="/credit-notes"
        class="btn-secondary text-sm"
      >
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
