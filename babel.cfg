# pybabel extraction config — walks Python source for gettext/ngettext
# call sites and Jinja templates for {% trans %}/{{ _(...) }} nodes.
# Domain is "messages" (matches saebooks_web/i18n.DOMAIN and the Makefile
# targets below). Extraction covers the whole package; template-string
# wrapping itself is a separate (later, gated) packet — this config just
# needs to exist and be correct so `make i18n-extract` produces a real
# .pot from day one, proving the pipeline end to end.
[python: saebooks_web/**.py]

[jinja2: templates/**.html]
encoding = utf-8
